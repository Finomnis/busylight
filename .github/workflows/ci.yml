on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
  release:
    types: [ published ]

name: CI

jobs:
  build_firmware_application:
    name: Build Application Firmware
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v6

      - name: Install toolchains
        run: rustup target add thumbv6m-none-eabi

      - name: Install components
        run: rustup component add llvm-tools

      - name: Install binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Install apt dependencies
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: signify-openbsd dfu-util
          version: 1.0

      - name: Install cargo dependencies
        run: cargo binstall -y flip-link cargo-binutils

      - name: Build
        working-directory: firmware/application
        run: cargo build --release

      - name: Create firmware bin file
        working-directory: firmware/application
        run: cargo objcopy --release -- -O binary target/busylight.bin

      - name: Create firmware hex file
        working-directory: firmware/application
        run: cargo objcopy --release -- -O ihex target/busylight.hex

      - name: Sign firmware file
        working-directory: firmware/application
        run: |
          export WORKSPACE_GIT_DESCRIBE=`git describe --tags --always --dirty`
          shasum -a 512 -b target/busylight.bin | head -c128 | xxd -p -r > target/message.txt
          signify-openbsd -S -s firmware/secrets/key.sec -m target/message.txt -x target/message.txt.sig
          cp target/busylight.bin target/busylight.${WORKSPACE_GIT_DESCRIBE}.dfu
          tail -n1 target/message.txt.sig | base64 -d -i - | dd ibs=10 skip=1 >> target/busylight.${WORKSPACE_GIT_DESCRIBE}.dfu
          dfu-suffix --vid 1209 --pid d9d0 --add "target/busylight.${WORKSPACE_GIT_DESCRIBE}.dfu"
          cp target/busylight.hex target/busylight.${WORKSPACE_GIT_DESCRIBE}.hex

      - name: Upload firmware dfu file as artifact
        uses: actions/upload-artifact@v7
        with:
          path: firmware/application/target/busylight.*.dfu
          if-no-files-found: error
          archive: false

      - name: Upload firmware hex file as artifact
        uses: actions/upload-artifact@v7
        with:
          path: firmware/application/target/busylight.*.hex
          if-no-files-found: error
          archive: false

  test_firmware_application:
    name: Run Application Firmware Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v6

      - name: Install toolchains
        run: rustup target add thumbv6m-none-eabi

      - name: Test
        working-directory: firmware/application
        run: cargo test-host

  build_firmware_bootloader:
    name: Build Bootloader Firmware
    runs-on: ubuntu-latest
    strategy:
      matrix:
        features:
          - ""
          - defmt
          - verify
          # Does not fit in the bootloader partition
          # - defmt,verify
      fail-fast: false
    steps:
      - name: Checkout sources
        uses: actions/checkout@v6

      - name: Install toolchains
        run: rustup target add thumbv6m-none-eabi

      - name: Install binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Install dependencies
        run: cargo binstall -y flip-link

      - name: Build
        working-directory: firmware/bootloader
        run: cargo build --release --features=${{ matrix.features }}
